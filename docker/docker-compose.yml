version: '3.8'

services:
  barbote-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${BARBOTE_PORT:-3006}:3006"
    environment:
      - NODE_ENV=production
      - DATABASE_PUBLIC_URL=${DATABASE_PUBLIC_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BARBOTE_PORT=3006
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - barbote-app
    restart: unless-stopped
    profiles: ["with-nginx"]

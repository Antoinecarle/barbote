version: '3.8'

services:
  # ─── Application ───────────────────────────────────────────────────────────
  barbote-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${BARBOTE_PORT:-3006}:3006"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_PUBLIC_URL=${DATABASE_PUBLIC_URL}
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - BARBOTE_PORT=3006
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    labels:
      - "com.barbote.service=app"
      - "com.barbote.version=${APP_VERSION:-1.0.0}"

  # ─── Optional: Local PostgreSQL (for development without Railway) ───────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=barbote
      - POSTGRES_USER=barbote
      - POSTGRES_PASSWORD=${DB_PASSWORD:-devpassword123}
    volumes:
      - barbote-db-data:/var/lib/postgresql/data
      - ../server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barbote -d barbote"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["local-db"]

  # ─── Optional: Nginx reverse proxy ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      barbote-app:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["with-nginx"]

  # ─── Optional: Redis cache (future feature) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - barbote-redis-data:/data
    profiles: ["with-cache"]

volumes:
  barbote-db-data:
    driver: local
  barbote-redis-data:
    driver: local

networks:
  default:
    name: barbote-network

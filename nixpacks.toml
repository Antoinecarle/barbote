[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "npm install --prefix server",
  "npm install --prefix frontend"
]

[phases.build]
cmds = [
  "npm run build --prefix frontend",
  "mkdir -p server/dist && cp -r frontend/dist/. server/dist/"
]

[start]
cmd = "node server/index.js"
